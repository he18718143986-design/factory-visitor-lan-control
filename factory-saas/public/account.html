<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>账户管理 — 厂区管控</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#070c18;--surface:#0d1525;--surface2:#111d30;--surface3:#172236;--border:#1c2d45;--border2:#243550;--accent:#38bdf8;--accent-dim:rgba(56,189,248,.1);--accent-glow:rgba(56,189,248,.3);--text:#c8d8ec;--text-dim:#4d6280;--text-muted:#2a3d56;--text-bright:#e8f0fc;--green:#34d399;--green-dim:rgba(52,211,153,.1);--yellow:#fbbf24;--yellow-dim:rgba(251,191,36,.1);--red:#f87171;--red-dim:rgba(248,113,113,.1);--purple:#a78bfa;--purple-dim:rgba(167,139,250,.1);--mono:'IBM Plex Mono',monospace;--sans:'Noto Sans SC',sans-serif;
  --fs-xs:10px;--fs-sm:11px;--fs-md:13px;--fs-lg:15px;--fs-data:11px;--fs-tag:10px;
  --visitor-row-content-h:auto;--visitor-row-h:auto;--visitor-card-expanded-h:auto;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(56,189,248,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.02) 1px,transparent 1px);background-size:32px 32px;pointer-events:none;z-index:0}

/* header */
.hdr{height:52px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;padding:0 20px;flex-shrink:0;position:relative;z-index:10}
.hdr::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent-glow),transparent)}
.hdr-logo{display:flex;align-items:center;gap:10px}
.hdr-logo-icon{width:32px;height:32px;border:1.5px solid var(--accent);border-radius:6px;display:grid;place-items:center;background:var(--accent-dim);box-shadow:0 0 12px var(--accent-glow)}
.hdr-logo-icon svg{width:16px;height:16px;fill:var(--accent)}
.hdr-title{font-family:var(--mono);font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-bright)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.hdr-user{font-size:12px;color:var(--text-dim)}
.hdr-user strong{color:var(--text-bright)}
.btn-logout{padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .15s}
.btn-logout:hover{border-color:var(--red);color:var(--red)}
.btn-nav{padding:5px 12px;border-radius:6px;border:1px solid var(--border2);background:transparent;color:var(--accent);font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .15s;}
.btn-nav:hover{border-color:var(--accent);background:var(--accent-dim);}

/* layout */
.account-layout{display:grid;grid-template-columns:280px minmax(0,1fr);flex:1;overflow:hidden;position:relative;z-index:2;min-height:0}

/* sidebar */
.account-sidebar{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.account-sidebar-head{padding:14px 16px;border-bottom:1px solid var(--border);font-family:var(--sans);font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;display:flex;align-items:center;justify-content:space-between}
.btn-add-sub{padding:4px 10px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--accent);font-size:11px;cursor:pointer;font-family:var(--sans);transition:all .15s}
.btn-add-sub:hover{border-color:var(--accent);background:var(--accent-dim)}
.sub-list{flex:1;overflow-y:auto;padding:8px}
.sub-list::-webkit-scrollbar{width:3px}
.sub-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.sub-card{padding:12px 14px;border-radius:10px;border:1px solid transparent;cursor:pointer;transition:all .15s;margin-bottom:6px}
.sub-card:hover{background:var(--surface2);border-color:var(--border2)}
.sub-card.active{background:rgba(56,189,248,.04);border-color:var(--accent)}
.sub-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sub-name{font-size:14px;font-weight:600;color:var(--text-bright)}
.sub-badge{font-family:var(--mono);font-size:9px;padding:2px 7px;border-radius:3px;font-weight:600;border:1px solid transparent}
.badge-trial{background:rgba(52,211,153,.1);border-color:rgba(52,211,153,.3);color:var(--green)}
.badge-active{background:rgba(56,189,248,.1);border-color:rgba(56,189,248,.3);color:var(--accent)}
.badge-expired{background:var(--red-dim);border-color:rgba(248,113,113,.3);color:var(--red)}
.sub-meta{font-size:11px;color:var(--text-dim);font-family:var(--mono)}
.sub-wifi{font-size:10px;color:var(--text-dim);margin-top:3px;display:flex;align-items:center;gap:4px}
.sub-wifi.bound{color:var(--green)}

/* main */
.account-main{overflow-y:auto;display:flex;flex-direction:column;background:transparent}
.account-main::-webkit-scrollbar{width:4px}
.account-main::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.account-main-inner{padding:20px 24px 32px;max-width:900px;margin:0 auto;width:100%}

/* section */
.section{margin-bottom:28px}
.section-title{font-family:var(--sans);font-size:13px;font-weight:700;color:var(--text-bright);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

/* subscription detail */
.sub-detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px}
.detail-card .key{font-size:10px;color:var(--text-dim);font-family:var(--sans);font-weight:600;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.detail-card .val{font-family:var(--mono);font-size:14px;color:var(--text-bright)}
.detail-card .val.large{font-size:22px;font-weight:700}
.detail-card.trial-active .val.large{color:var(--green)}
.detail-card.warn .val.large{color:var(--yellow)}
.detail-card.expired .val.large{color:var(--red)}

/* payment */
.payment-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.plan-option{border:2px solid var(--border2);border-radius:10px;padding:16px;cursor:pointer;transition:all .15s;position:relative}
.plan-option:hover{border-color:var(--accent);background:rgba(56,189,248,.03)}
.plan-option.selected{border-color:var(--accent);background:var(--accent-dim)}
.plan-option input[type=radio]{position:absolute;opacity:0;pointer-events:none}
.plan-name{font-size:13px;font-weight:700;color:var(--text-bright);margin-bottom:4px}
.plan-price{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent)}
.plan-desc{font-size:11px;color:var(--text-dim);margin-top:4px}
.plan-save{display:inline-block;font-size:10px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.25);color:var(--green);border-radius:4px;padding:2px 6px;margin-top:5px}
.payment-info{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.payment-info .pi-title{font-size:12px;font-weight:700;color:var(--text-bright);margin-bottom:12px}
.pi-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.pi-row:last-child{border-bottom:none}
.pi-key{font-size:12px;color:var(--text-dim)}
.pi-val{font-family:var(--mono);font-size:12px;color:var(--text-bright);user-select:all}
.field-group{margin-bottom:14px}
.field-group label{display:block;font-size:11px;color:var(--text-dim);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.field-group input,.field-group textarea{width:100%;padding:9px 12px;background:var(--surface3);border:1px solid var(--border2);border-radius:8px;color:var(--text-bright);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s}
.field-group input:focus,.field-group textarea:focus{border-color:var(--accent)}
.field-group input::placeholder,.field-group textarea::placeholder{color:var(--text-dim)}
.field-group textarea{resize:vertical;min-height:70px}
.btn-submit{padding:10px 24px;background:var(--accent);color:#000;font-family:var(--sans);font-size:13px;font-weight:700;border:none;border-radius:8px;cursor:pointer;transition:all .15s}
.btn-submit:hover{background:#7dd3fc;box-shadow:0 0 14px var(--accent-glow)}
.btn-submit:disabled{opacity:.4;cursor:not-allowed}

/* wifi binding */
.wifi-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px}
.wifi-status{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.wifi-dot{width:10px;height:10px;border-radius:50%;background:var(--text-dim)}
.wifi-dot.bound{background:var(--green);box-shadow:0 0 8px rgba(52,211,153,.5)}
.wifi-info{font-family:var(--mono);font-size:13px;color:var(--text-bright)}
.wifi-desc{font-size:12px;color:var(--text-dim);line-height:1.6;margin-bottom:14px}
.btn-bind{padding:9px 18px;background:transparent;border:1px solid var(--accent);border-radius:8px;color:var(--accent);font-family:var(--sans);font-size:13px;cursor:pointer;transition:all .15s}
.btn-bind:hover{background:var(--accent-dim)}
.btn-unbind{padding:9px 18px;background:transparent;border:1px solid rgba(248,113,113,.4);border-radius:8px;color:var(--red);font-family:var(--sans);font-size:13px;cursor:pointer;transition:all .15s;margin-left:8px}
.btn-unbind:hover{background:var(--red-dim)}
.rebind-history{margin-top:14px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px}
.rebind-item{padding:10px 0;border-bottom:1px solid var(--border)}
.rebind-item:last-child{border-bottom:none}
.rebind-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
.rebind-subnet{font-family:var(--mono);font-size:12px;color:var(--text-bright)}
.rebind-meta{margin-top:4px;font-size:11px;color:var(--text-dim);line-height:1.6}
.badge-small{font-family:var(--mono);font-size:9px;padding:2px 6px;border-radius:3px;border:1px solid transparent}
.badge-review{background:var(--yellow-dim);border-color:rgba(251,191,36,.35);color:var(--yellow)}
.badge-ok{background:var(--green-dim);border-color:rgba(52,211,153,.35);color:var(--green)}
.badge-no{background:var(--red-dim);border-color:rgba(248,113,113,.35);color:var(--red)}

/* payment history */
.pay-table{width:100%;border-collapse:collapse;font-size:12px}
.pay-table th{padding:8px 12px;text-align:left;font-family:var(--mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-dim);border-bottom:1px solid var(--border);background:var(--surface2)}
.pay-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text)}
.pay-table tr:last-child td{border-bottom:none}
.status-pending{color:var(--yellow)}
.status-confirmed{color:var(--green)}
.status-rejected{color:var(--red)}

/* empty */
.empty{padding:40px 20px;text-align:center;color:var(--text-dim);font-size:13px}
.empty-icon{font-size:36px;margin-bottom:10px;opacity:.4}

.alert{padding:12px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
.alert-success{background:var(--green-dim);border:1px solid rgba(52,211,153,.3);color:var(--green)}
.alert-error{background:var(--red-dim);border:1px solid rgba(248,113,113,.3);color:var(--red)}
.trial-banner{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:18px 20px;background:linear-gradient(135deg,rgba(52,211,153,.07),rgba(56,189,248,.05));border:1px solid rgba(52,211,153,.25);border-radius:12px;margin-bottom:20px;flex-wrap:wrap}
.trial-banner-title{font-size:15px;font-weight:700;color:var(--green);margin-bottom:4px}
.trial-banner-desc{font-size:13px;color:var(--text);line-height:1.6}
.trial-banner-desc strong{color:var(--text-bright)}
.btn-subscribe-now{padding:9px 20px;background:transparent;border:1px solid var(--green);border-radius:8px;color:var(--green);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn-subscribe-now:hover{background:var(--green-dim);box-shadow:0 0 12px rgba(52,211,153,.2)}

/* ── 入场码面板 ── */
.qr-panel{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap}
.qr-block{display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0}
.qr-img{width:200px;height:200px;border-radius:10px;background:var(--surface2);border:1px solid var(--border2);display:grid;place-items:center;overflow:hidden}
.qr-img img{width:100%;height:100%;display:block;border-radius:10px}
.qr-img-placeholder{color:var(--text-dim);font-size:13px;text-align:center;padding:20px}
.qr-label{font-family:var(--mono);font-size:10px;color:var(--text-dim);letter-spacing:.06em;text-transform:uppercase}
.qr-info{flex:1;min-width:200px;display:flex;flex-direction:column;gap:14px}
.qr-info-title{font-size:15px;font-weight:700;color:var(--text-bright)}
.qr-info-desc{font-size:13px;color:var(--text-dim);line-height:1.7}
.qr-steps{display:flex;flex-direction:column;gap:8px}
.qr-step{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--text)}
.qr-step-num{width:20px;height:20px;border-radius:50%;background:var(--accent-dim);border:1px solid rgba(56,189,248,.3);color:var(--accent);font-family:var(--mono);font-size:10px;font-weight:700;display:grid;place-items:center;flex-shrink:0;margin-top:1px}
.qr-url-box{display:flex;gap:8px;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px}
.qr-url-text{font-family:var(--mono);font-size:11px;color:var(--accent);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;user-select:all}
.btn-copy-url{padding:4px 10px;border:1px solid var(--border2);border-radius:6px;background:transparent;color:var(--text-dim);font-size:11px;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:var(--sans)}
.btn-copy-url:hover{border-color:var(--accent);color:var(--accent)}
.btn-refresh-qr{padding:7px 16px;border:1px solid var(--border2);border-radius:8px;background:transparent;color:var(--text-dim);font-size:12px;cursor:pointer;transition:all .15s;font-family:var(--sans);margin-top:4px;align-self:flex-start}
.btn-refresh-qr:hover{border-color:var(--accent);color:var(--accent)}

/* ── 访客监控面板 ── */

/* ── 管控功能定制 ── */
.feature-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.feature-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.feature-item:last-of-type{border-bottom:none}
.feature-item input[type=checkbox]{accent-color:var(--accent);width:18px;height:18px;cursor:pointer;flex-shrink:0}
.feature-item-info{flex:1}
.feature-item-name{font-size:14px;font-weight:600;color:var(--text-bright)}
.feature-item-desc{font-size:11px;color:var(--text-dim);margin-top:2px}
.feature-item-price{font-family:var(--mono);font-size:14px;color:var(--accent);white-space:nowrap;flex-shrink:0}
.feature-item-price.off{color:var(--text-muted)}
.feature-summary{display:flex;justify-content:space-between;align-items:center;padding:14px 0 0;margin-top:4px;border-top:1px solid var(--border2)}
.feature-summary-total{font-size:15px;font-weight:700;color:var(--text-bright)}
.feature-summary-total span{color:var(--accent);font-family:var(--mono)}
.btn-save-features{padding:8px 20px;background:var(--accent);color:#000;font-family:var(--sans);font-size:13px;font-weight:700;border:none;border-radius:8px;cursor:pointer;transition:all .15s}
.btn-save-features:hover{background:#7dd3fc;box-shadow:0 0 14px var(--accent-glow)}
.btn-save-features:disabled{opacity:.4;cursor:not-allowed}
.feature-msg{font-size:12px;margin-top:10px}

/* ── 收款二维码 ── */
.payment-qr-section{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
.payment-qr-section .pi-title{font-size:12px;font-weight:700;color:var(--text-bright);margin-bottom:12px}
.payment-qr-grid{display:flex;gap:24px;justify-content:center;flex-wrap:wrap}
.payment-qr-item{display:flex;flex-direction:column;align-items:center;gap:8px}
.payment-qr-item img{width:180px;height:180px;border-radius:10px;border:2px solid var(--border2);background:#fff;object-fit:contain;padding:6px}
.payment-qr-label{font-size:12px;font-weight:600;color:var(--text-dim);font-family:var(--sans)}
.payment-qr-hint{font-size:11px;color:var(--text-dim);text-align:center;margin-top:10px}
.payment-qr-steps{margin-top:14px;display:flex;flex-direction:column;gap:8px}
.payment-qr-step{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text)}
.payment-qr-step strong{color:var(--accent);font-family:var(--mono)}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--accent-dim);border:1px solid rgba(56,189,248,.3);color:var(--accent);font-family:var(--mono);font-size:10px;font-weight:700;display:grid;place-items:center;flex-shrink:0}
.payment-qr-placeholder{text-align:center;padding:24px 16px}
.plan-breakdown{font-size:10px;color:var(--text-dim);margin-top:2px;font-family:var(--mono)}
.payment-transfer-toggle{margin-bottom:12px}
.btn-toggle-transfer{background:transparent;border:1px solid var(--border2);border-radius:8px;padding:8px 16px;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:var(--sans);transition:all .15s;width:100%;text-align:left}
.btn-toggle-transfer:hover{border-color:var(--accent);color:var(--accent)}
.pay-confirm-section{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:16px}
.pay-confirm-note{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim);margin-bottom:12px}
.pay-confirm-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.btn-pay-confirm{width:100%;padding:14px;background:linear-gradient(135deg,var(--green),#2dd4bf);color:#000;font-family:var(--sans);font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;transition:all .2s;letter-spacing:.02em}
.btn-pay-confirm:hover{box-shadow:0 0 20px rgba(52,211,153,.4);transform:translateY(-1px)}

/* ── 发票 ── */
.invoice-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px}
.btn-invoice-sm{padding:3px 10px;border:1px solid var(--accent);border-radius:6px;background:transparent;color:var(--accent);font-size:11px;cursor:pointer;font-family:var(--sans);transition:all .15s}
.btn-invoice-sm:hover{background:var(--accent-dim)}
.invoice-status{font-size:11px;font-family:var(--mono)}
.invoice-pending{color:var(--yellow)}
.invoice-issued{color:var(--green)}
.invoice-rejected{color:var(--red)}
.field-group select{width:100%;padding:9px 12px;background:var(--surface3);border:1px solid var(--border2);border-radius:8px;color:var(--text-bright);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .15s;appearance:auto}
.field-group select:focus{border-color:var(--accent)}
</style>
</head>
<body>
<header class="hdr">
  <div class="hdr-logo">
    <div class="hdr-logo-icon"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
    <span class="hdr-title">Factory Control</span>
  </div>
  <div class="hdr-right">
    <button class="btn-nav" id="btnBackDashboard">← 返回管控台</button>
    <span class="hdr-user">欢迎，<strong id="userName">…</strong></span>
    <button class="btn-logout" id="btnLogout">退出登录</button>
  </div>
</header>

<div class="account-layout">
  <!-- 左：厂区列表 -->
  <aside class="account-sidebar">
    <div class="account-sidebar-head">
      <span>我的厂区</span>
      <button class="btn-add-sub" id="btnAddSub">+ 新增厂区</button>
    </div>
    <div class="sub-list" id="subList"><div class="empty"><div class="empty-icon">🏭</div>加载中…</div></div>
  </aside>

  <!-- 右：详情 -->
