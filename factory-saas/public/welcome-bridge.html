<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>厂区访客 · 下一步</title>
  <style>
    :root {
      --accent: #3b82f6;
      --accent-soft: rgba(59,130,246,.12);
      --text: #e5e7eb;
      --text-dim: #9ca3af;
      --danger: #f97373;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, #111827 0, #020617 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: rgba(15,23,42,.9);
      border-radius: 18px;
      border: 1px solid rgba(148,163,184,.25);
      padding: 24px 20px;
    }
    .title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: var(--text-dim); line-height: 1.7; margin-bottom: 18px; }
    .status {
      font-size: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(15,23,42,.9);
      border: 1px solid rgba(148,163,184,.45);
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
      flex-shrink: 0;
      margin-top: 6px;
    }
    .status-text { flex: 1; }
    .status-main {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .status-sub {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.7;
    }
    .open-app-section { display: none; margin-top: 18px; padding: 14px; background: rgba(0,0,0,.25); border-radius: 10px; border: 1px solid rgba(148,163,184,.3); }
    .open-app-section.show { display: block; }
    .section-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .open-app-section .hint { font-size: 12px; color: var(--text-dim); line-height: 1.6; margin-bottom: 10px; }
    .btn-open-app { width: 100%; padding: 12px; border-radius: 8px; border: none; background: linear-gradient(135deg, #3b82f6, #06b6d4); color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; }
    .btn-open-app:active { opacity: .9; }
    .download-section { display: none; margin-top: 12px; padding: 14px; background: rgba(0,0,0,.25); border-radius: 10px; border: 1px solid rgba(148,163,184,.3); }
    .download-section.show { display: block; }
    .download-section .section-label { margin-bottom: 8px; }
    .download-section .hint { font-size: 12px; color: var(--text-dim); line-height: 1.6; margin-bottom: 10px; }
    .download-link { display: block; text-align: center; padding: 12px; margin-bottom: 10px; border-radius: 8px; background: linear-gradient(135deg, #3b82f6, #06b6d4); color: #fff; font-size: 15px; font-weight: 500; text-decoration: none; }
    .download-link:active { opacity: .9; }
    .download-url { font-size: 12px; word-break: break-all; color: var(--accent); padding: 10px; background: rgba(0,0,0,.3); border-radius: 6px; margin-bottom: 10px; -webkit-user-select: all; user-select: all; }
    .btn-copy { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-size: 14px; cursor: pointer; }
    .btn-copy:active { opacity: .8; }
    .small { font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="title">厂区访客自助入场</div>
    <div class="subtitle" id="subtitle">您的登记已完成，下一步请根据提示完成安装/打开 APP。</div>

    <div class="status">
      <div class="status-dot"></div>
      <div class="status-text">
        <div class="status-main" id="statusMain"></div>
        <div class="status-sub" id="statusSub"></div>
      </div>
    </div>

    <div class="open-app-section" id="openAppSection">
      <div class="section-label">已安装 APP？</div>
      <div class="hint">若未自动打开，请点击下方按钮唤起「厂区管控」APP。</div>
      <button type="button" class="btn-open-app" id="btnOpenApp">打开「厂区管控」APP</button>
    </div>

    <div class="download-section" id="downloadSection">
      <div class="section-label">未安装 APP？</div>
      <div class="hint">请<strong>点击下方链接</strong>下载安装包；若点击无反应，可长按链接复制后粘贴到地址栏打开。安装完成后重新扫描自助入场码即可。</div>
      <a class="download-link" id="downloadLink" href="">点击下载「厂区管控」APP</a>
      <div class="download-url" id="downloadUrl"></div>
      <button type="button" class="btn-copy" id="btnCopy">复制链接</button>
    </div>

    <div class="small">如有问题请联系门卫协助</div>
  </div>

  <script src="/js/welcome-bridge.js"></script>
</body>
</html>
