<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>厂区访客自助入场</title>
  <style>
    :root {
      --accent: #3b82f6;
      --accent-soft: rgba(59,130,246,.12);
      --text: #e5e7eb;
      --text-dim: #9ca3af;
      --danger: #f97373;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: radial-gradient(circle at top, #111827 0, #020617 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }
    .card {
      width: 100%;
      max-width: 380px;
      background: rgba(15,23,42,.9);
      border-radius: 18px;
      border: 1px solid rgba(148,163,184,.25);
      padding: 24px 20px;
    }
    .title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
    .subtitle { font-size: 12px; color: var(--text-dim); line-height: 1.6; margin-bottom: 20px; }
    /* 微信内：一句引导，20 字内 */
    .wechat-only { display: none; }
    .wechat-only.show { display: block; }
    .wechat-guide {
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      margin: 0;
    }
    .wechat-guide strong { color: var(--accent); }
    /* 浏览器内：状态 + 打开 APP / 下载 */
    .browser-flow { display: none; }
    .browser-flow.show { display: block; }
    .browser-flow .subtitle { margin-bottom: 16px; }
    .status {
      font-size: 14px;
      padding: 12px 14px;
      border-radius: 10px;
      background: rgba(15,23,42,.9);
      border: 1px solid rgba(148,163,184,.45);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
      flex-shrink: 0;
    }
    .status.err .status-dot { background: var(--danger); box-shadow: 0 0 0 4px rgba(249,115,115,.25); }

    .status-text #statusMain {
      font-size: 18px;
      font-weight: 800;
    }
    .status-text #statusSub {
      font-size: 16px;
    }
    .status-sub { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
    .open-app-section { display: none; margin-top: 16px; padding: 14px; background: rgba(0,0,0,.25); border-radius: 10px; border: 1px solid rgba(148,163,184,.3); }
    .open-app-section.show { display: block; }
    .section-label { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .open-app-section .hint { font-size: 12px; color: var(--text-dim); line-height: 1.6; margin-bottom: 10px; }
    .btn-open-app { width: 100%; padding: 12px; border-radius: 8px; border: none; background: linear-gradient(135deg, #3b82f6, #06b6d4); color: #fff; font-size: 15px; font-weight: 500; cursor: pointer; }
    .btn-open-app:active { opacity: .9; }
    .download-section { display: none; margin-top: 12px; padding: 14px; background: rgba(0,0,0,.25); border-radius: 10px; border: 1px solid rgba(148,163,184,.3); }
    .download-section.show { display: block; }
    .download-section .section-label { margin-bottom: 8px; }
    .download-section .hint { font-size: 12px; color: var(--text-dim); line-height: 1.6; margin-bottom: 10px; }
    .download-link { display: block; text-align: center; padding: 12px; margin-bottom: 10px; border-radius: 8px; background: linear-gradient(135deg, #3b82f6, #06b6d4); color: #fff; font-size: 15px; font-weight: 500; text-decoration: none; }
    .download-link:active { opacity: .9; }
    .download-url { font-size: 12px; word-break: break-all; color: var(--accent); padding: 10px; background: rgba(0,0,0,.3); border-radius: 6px; margin-bottom: 10px; -webkit-user-select: all; user-select: all; }
    .btn-copy { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-size: 14px; cursor: pointer; }
    .btn-copy:active { opacity: .8; }
    /* 表单 */
    /* 表单：输入框 */
    .input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid rgba(148,163,184,.5);
      background: rgba(15,23,42,.9);
      color: var(--text-bright);
      font-family: var(--sans);
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }

    .form {
      margin-bottom: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .form-row {
      display: flex;
      gap: 8px;
    }
    .form-row .field {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .label {
      font-size: 12px;
      color: var(--text-dim);
    }

    .input::placeholder { color: rgba(148,163,184,.7); }
    .btn-primary {
      width: 100%;
      margin-top: 4px;
      padding: 10px;
      border-radius: 8px;
      border: none;
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: #fff;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
    }
    .btn-primary:active { opacity: .9; }
    .error { margin-top: 8px; font-size: 12px; color: var(--danger); display: none; }
    .small { font-size: 11px; color: var(--text-dim); text-align: center; margin-top: 16px; }

    /* 管控内容标签 */
    .controls-info { display:none; margin-bottom:16px; }
    .controls-info.show { display:block; }
    .controls-info .controls-title { font-size:12px; color:var(--text-dim); margin-bottom:8px; }
    .controls-info .controls-badges { display:flex; flex-wrap:wrap; gap:8px; }
    .controls-info .badge {
      display:inline-flex; align-items:center; gap:4px;
      padding:6px 12px; border-radius:20px;
      font-size:12px; font-weight:500;
      background:rgba(239,68,68,.12); color:#fca5a5;
      border:1px solid rgba(239,68,68,.25);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="wechat-only" id="wechatOnly">
      <p class="wechat-guide">请先填写来访信息</p>
    </div>

    <!-- 浏览器内：登记 → 检测 APP → 打开 APP 或 下载链接 -->
    <div class="browser-flow" id="browserFlow">
      <div class="subtitle" id="browserSubtitle">完成后将自动登记</div>

      <!-- 管控内容标签 -->
      <div class="controls-info" id="controlsInfo">
        <div class="controls-title">入场后将启用以下管控：</div>
        <div class="controls-badges" id="controlsBadges"></div>
      </div>

      <div class="form" id="infoForm">
        <div id="network-warn" style="display:none;
             background:#fff3cd; color:#856404;
             border:1px solid #ffc107; border-radius:6px;
             padding:12px 16px; margin-bottom:16px; font-size:14px;">
          ⚠️ 您的手机未连接厂区 Wi-Fi，无法完成入场登记。<br>
          请先在手机「设置 → Wi-Fi」中连接厂区网络，再重新扫码。
        </div>
        <div class="field">
          <label class="label" for="visitorName">来访人员姓名</label>
          <input class="input" id="visitorName" placeholder="必填，例如：张三" />
        </div>
        <div class="field">
          <label class="label" for="visitorCompany">公司 / 单位</label>
          <input class="input" id="visitorCompany" placeholder="选填，例如：XX 科技" />
        </div>
        <button type="button" class="btn-primary" id="submit-btn">开始登记</button>
      </div>

      <div class="status" id="statusBox">
        <div class="status-dot" id="statusDot"></div>
        <div class="status-text">
          <div id="statusMain">正在登记入场…</div>
          <div class="status-sub" id="statusSub"></div>
        </div>
      </div>

      <div class="open-app-section" id="openAppSection">
        <div class="section-label">已安装 APP？</div>
        <div class="hint">若未自动打开，请点击下方按钮唤起「厂区管控」APP。</div>
        <button type="button" class="btn-open-app" id="btnOpenApp">打开「厂区管控」APP</button>
      </div>

      <div class="download-section" id="downloadSection">
        <div class="section-label">未安装 APP？</div>
        <div class="hint">请<strong>点击下方链接</strong>下载安装包；若点击无反应，可长按链接复制后粘贴到地址栏打开。安装完成后重新扫描自助入场码即可。</div>
        <a class="download-link" id="downloadLink" href="">点击下载「厂区管控」APP</a>
        <div class="download-url" id="downloadUrl"></div>
        <button type="button" class="btn-copy" id="btnCopy">复制链接</button>
      </div>

      <div class="error" id="errorBox"></div>
    </div>

    <div class="small">如有问题请联系门卫协助</div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/welcome.js"></script>
</body>
</html>
