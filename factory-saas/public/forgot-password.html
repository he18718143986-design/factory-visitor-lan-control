<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>厂区管控 — 重置密码</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#070c18;--surface:rgba(13,21,37,.95);--border:rgba(56,189,248,.18);--accent:#38bdf8;--accent-dim:rgba(56,189,248,.1);--text:#c8d8ec;--text-dim:#4d6280;--text-bright:#e8f0fc;--red:#f87171;--green:#34d399;--mono:'IBM Plex Mono',monospace;--sans:'Noto Sans SC',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);font-family:var(--sans);color:var(--text);padding:24px 16px;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(56,189,248,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.02) 1px,transparent 1px);background-size:32px 32px;pointer-events:none}
.card{width:100%;max-width:400px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:36px 32px;backdrop-filter:blur(20px);box-shadow:0 0 80px rgba(56,189,248,.06),0 24px 64px rgba(0,0,0,.6);animation:fadeUp .5s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;gap:12px;margin-bottom:32px}
.logo-icon{width:40px;height:40px;border:2px solid var(--accent);border-radius:10px;display:grid;place-items:center;background:var(--accent-dim);box-shadow:0 0 20px rgba(56,189,248,.3)}
.logo-icon svg{width:20px;height:20px;fill:var(--accent)}
.logo-text{font-family:var(--mono);font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-bright)}
.logo-sub{font-size:11px;color:var(--text-dim);margin-top:2px}
h1{font-size:22px;font-weight:700;color:var(--text-bright);margin-bottom:6px}
.sub{font-size:13px;color:var(--text-dim);margin-bottom:28px}
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px}
.field input{width:100%;height:42px;padding:0 14px;background:rgba(255,255,255,.04);border:1px solid rgba(56,189,248,.2);border-radius:9px;color:var(--text-bright);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s}
.field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(56,189,248,.12)}
.field input::placeholder{color:var(--text-dim)}
.btn{width:100%;height:46px;background:var(--accent);color:#000;font-family:var(--sans);font-size:15px;font-weight:700;border:none;border-radius:10px;cursor:pointer;transition:all .15s;margin-top:4px}
.btn:hover{background:#7dd3fc;box-shadow:0 0 20px rgba(56,189,248,.35)}
.btn:active{transform:scale(.99)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.err{background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--red);margin-top:16px;display:none}
.ok{background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.3);border-radius:8px;padding:10px 14px;font-size:13px;color:var(--green);margin-top:16px;display:none}
.link-btn{display:block;width:100%;height:46px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--accent);font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:all .15s;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:16px}
.link-btn:hover{border-color:var(--accent);background:var(--accent-dim)}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg></div>
    <div><div class="logo-text">Factory Control</div><div class="logo-sub">厂区访客管控系统</div></div>
  </div>

  <!-- Step 1: 输入邮箱 -->
  <div id="step1">
    <h1>重置密码</h1>
    <p class="sub">输入注册邮箱，我们将发送验证码</p>
    <form id="emailForm">
      <div class="field"><label>邮箱</label><input type="email" id="email" placeholder="your@email.com" required autocomplete="email"></div>
      <button type="submit" class="btn" id="sendBtn">发送验证码</button>
      <div class="err" id="errBox1"></div>
      <div class="ok" id="okBox1"></div>
    </form>
  </div>

  <!-- Step 2: 输入验证码 + 新密码 -->
  <div id="step2" class="hidden">
    <h1>输入验证码</h1>
    <p class="sub">验证码已发送至 <strong id="sentEmail"></strong></p>
    <form id="resetForm">
      <div class="field"><label>验证码</label><input type="text" id="code" placeholder="6 位数字" required maxlength="6" pattern="[0-9]{6}" inputmode="numeric" autocomplete="one-time-code"></div>
      <div class="field"><label>新密码</label><input type="password" id="newPassword" placeholder="至少 8 位" required minlength="8" autocomplete="new-password"></div>
      <div class="field"><label>确认新密码</label><input type="password" id="confirmPassword" placeholder="再次输入新密码" required minlength="8" autocomplete="new-password"></div>
      <button type="submit" class="btn" id="resetBtn">重置密码</button>
      <div class="err" id="errBox2"></div>
      <div class="ok" id="okBox2"></div>
    </form>
  </div>

  <a href="/login" class="link-btn">← 返回登录</a>
</div>
<script src="/js/common.js"></script>
<script>
'use strict';
function readCookie(name) {
  const key = name + '=';
  const found = document.cookie.split(';').map(s => s.trim()).find(v => v.startsWith(key));
  return found ? decodeURIComponent(found.slice(key.length)) : '';
}

let _email = '';

document.getElementById('emailForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('sendBtn');
  const err = document.getElementById('errBox1');
  const ok  = document.getElementById('okBox1');
  err.style.display = 'none'; ok.style.display = 'none';
  btn.disabled = true; btn.textContent = '发送中…';
  try {
    const csrf = readCookie('csrf_token');
    const r = await fetch('/api/auth/forgot-password', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json', ...(csrf ? { 'X-CSRF-Token': csrf } : {}) },
      body: JSON.stringify({ email: document.getElementById('email').value }),
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.message || '请求失败'; err.style.display = 'block'; return; }
    _email = document.getElementById('email').value;
    document.getElementById('sentEmail').textContent = _email;
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
  } catch (ex) { err.textContent = '网络错误，请稍后重试'; err.style.display = 'block'; }
  finally { btn.disabled = false; btn.textContent = '发送验证码'; }
});

document.getElementById('resetForm').addEventListener('submit', async e => {
  e.preventDefault();
  const btn = document.getElementById('resetBtn');
  const err = document.getElementById('errBox2');
  const ok  = document.getElementById('okBox2');
  err.style.display = 'none'; ok.style.display = 'none';

  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  if (newPassword !== confirmPassword) { err.textContent = '两次输入的密码不一致'; err.style.display = 'block'; return; }

  btn.disabled = true; btn.textContent = '重置中…';
  try {
    const csrf = readCookie('csrf_token');
    const r = await fetch('/api/auth/reset-password', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json', ...(csrf ? { 'X-CSRF-Token': csrf } : {}) },
      body: JSON.stringify({ email: _email, code: document.getElementById('code').value, newPassword }),
    });
    const d = await r.json();
    if (!r.ok) { err.textContent = d.message || '重置失败'; err.style.display = 'block'; return; }
    ok.textContent = '密码已重置，3 秒后跳转登录…'; ok.style.display = 'block';
    setTimeout(() => { window.location.href = '/login'; }, 3000);
  } catch (ex) { err.textContent = '网络错误，请稍后重试'; err.style.display = 'block'; }
  finally { btn.disabled = false; btn.textContent = '重置密码'; }
});
</script>
</body>
</html>
